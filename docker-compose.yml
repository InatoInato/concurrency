services:
  db:
    image: postgres:16.0-alpine
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: go_user
      POSTGRES_PASSWORD: golang_123
      POSTGRES_DB: golang
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: concurrency
    depends_on:
      - db
    ports:
      - "8080:8080"

volumes:
  pg_data: